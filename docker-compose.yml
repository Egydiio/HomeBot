services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: homebot_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - homebot
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: homebot_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - homebot
    depends_on:
      - app

  whatsapp-service:
    build:
      context: ./whatsapp-service
    container_name: homebot_whatsapp_service
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./whatsapp-service/.wwebjs_auth:/app/.wwebjs_auth
      - ./whatsapp-service/.wwebjs_cache:/app/.wwebjs_cache
    env_file:
      - ./whatsapp-service/.env
    networks:
      - homebot
    depends_on:
      - app
      - nginx

  postgres:
    image: postgres:16-alpine
    container_name: homebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-homebot}
      POSTGRES_USER: ${DB_USERNAME:-homebot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - homebot

  redis:
    image: redis:7-alpine
    container_name: homebot_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - homebot

  paddleocr:
    build:
      context: ./docker/paddleocr
    container_name: homebot_paddleocr
    restart: unless-stopped
    ports:
      - "8866:8866"
    volumes:
      - paddleocr_models:/root/.paddleocr
    networks:
      - homebot

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: homebot_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - homebot
    depends_on:
      - postgres
      - redis
      - whatsapp-service

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: homebot_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - homebot
    depends_on:
      - postgres
      - redis
      - whatsapp-service

networks:
  homebot:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  paddleocr_models:
